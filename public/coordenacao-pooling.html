<link rel="stylesheet" href="/styles.css">
<div class="container">
    <div class="card">
        <h2>Coordenação - Polling</h2>
        <ul id="lista"></ul>
    </div>
</div>

<script>
    async function atualizar() {
        const res = await fetch("/diario");
        const diario = await res.json();

        const dataHoje = new Date().toISOString().split("T")[0];
        const aula = diario.aulas ? diario.aulas.find(a => a.data === dataHoje) : null;

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!aula) return;

        diario.alunos.forEach(aluno => {
            const status = aula.presencas[aluno.matricula] || "Não marcado";
            const cls = status === 'Presente' ? 'status-present' : status === 'Ausente' ? 'status-absent' : '';
            lista.innerHTML += `<li class="${cls}">${aluno.nome} - ${status}</li>`;
        });
    }

    setInterval(atualizar, 3000);
    atualizar();
</script>
