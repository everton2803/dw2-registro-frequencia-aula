<link rel="stylesheet" href="/styles.css">
<div class="container">
  <div class="card">
    <h2>Diário - Professor</h2>

    <div class="controls" style="margin:12px 0">
      <button onclick="novaAula()">Criar Aula de Hoje</button>
      <button onclick="marcarTodos()" class="secondary">Marcar Todos como Presentes</button>
      <button onclick="removerAula()" class="secondary">Remover Aula de Hoje</button>
    </div>

    <ul id="lista"></ul>
  </div>
</div>

<script>
  async function carregar() {
    const res = await fetch("/diario");
    const diario = await res.json();

    const dataHoje = new Date().toISOString().split("T")[0];
    const aula = diario.aulas.find(a => a.data === dataHoje);

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    diario.alunos.forEach(aluno => {
      const status = aula?.presencas[aluno.matricula] || "Não marcado";
      const statusClass = status === 'Presente' ? 'status-present' : status === 'Ausente' ? 'status-absent' : '';

      lista.innerHTML += `
      <li class="${statusClass}">
        <span>${aluno.nome} - <b>${status}</b></span>
        <span>
          <button class="btn-present" onclick="marcar('${aluno.matricula}','Presente')">Presente</button>
          <button class="btn-absent" onclick="marcar('${aluno.matricula}','Ausente')">Ausente</button>
        </span>
      </li>
    `;
    });
  }

  async function novaAula() {
    await fetch("/nova-aula", { method: "POST" });
    carregar();
  }

  async function removerAula() {
    const data = new Date().toISOString().split("T")[0];
    await fetch("/aula/" + data, { method: "DELETE" });
    carregar();
  }

  async function marcar(matricula, status) {
    await fetch("/marcar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ matricula, status })
    });
    carregar();
  }

  async function marcarTodos() {
    const data = new Date().toISOString().split("T")[0];
    await fetch("/marcar-todos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data, status: "Presente" })
    });
    carregar();
  }

  carregar();
</script>
